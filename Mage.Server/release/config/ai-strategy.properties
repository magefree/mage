# Strategic AI defaults for packaged servers.
#
# JVM -D properties override values in this file. Example:
#   -Dxmage.ai.strategy.traceOnly=true
#
# Scope:
# - These flags are for the Mad Strategic AI and its trace/companion tooling.
# - They are intentionally not for changing the original Mad AI control path.
# - Restart the server after changing this file; these are read as JVM/system properties.
#
# Keep this file in sync with ComputerPlayerMadStrategic, scoring modules,
# JsonlAiDecisionTrace, and AiCompanionAdvisor.
#
# Module tuning pattern:
# - *.enabled=false disables that module entirely. Its labels disappear from traces.
# - *.apply=false keeps the module available for monitor/trace output but applies 0 live score.
# - *.maxScoreModifier caps that module's absolute score contribution.
#   Lower values make the module less influential. Higher values make it more willing to
#   override the base simulation score. 0 neutralizes the module; negative values are clamped to 0.
#   Values above xmage.ai.strategy.maxScoreModifier usually only matter if the global cap is raised too.

# Core strategic AI
#
# Master strategic scoring gate for ComputerPlayerMadStrategic.
# Packaged default: true.
# false: skips strategic score modules and strategic-only behavior gates that check this flag.
# true: allows strategic scoring; individual modules still need their own enabled/apply flags.
# Warning: search-stabilization flags below are controlled separately.
xmage.ai.strategy=true

# Global monitor mode for strategic scoring.
# Packaged default: false.
# true: modules emit raw strategy signals, but live score modifiers are not applied.
# false: modules with *.apply=true can affect decisions.
# Warning: true also blocks strategic hand-quality discard targeting.
xmage.ai.strategy.traceOnly=false

# Global cap on the combined applied strategic modifier after all modules are summed.
# Packaged default: 110. Code fallback if this key is removed: 280.
# Lower: base Mad simulation dominates more; safer for conservative tuning.
# Higher: strategic modules can override more close or medium-confidence base scores.
# Warning: very high values can let heuristics overpower concrete simulation results.
xmage.ai.strategy.maxScoreModifier=110

# Trace and companion
#
# Enables JSONL decision trace files.
# Packaged default: false.
# false: no trace writer and lowest overhead.
# true: writes decision/candidate/module data to xmage.ai.trace.dir.
# Warning: tracing increases disk usage and can add measurable overhead in long games.
xmage.ai.trace=false

# Directory for JSONL trace files.
# Packaged default: logs/ai-decisions.
# Relative paths are resolved from the server working directory.
# Use a writable local path. Large trace runs should be cleaned or rotated manually.
xmage.ai.trace.dir=logs/ai-decisions

# Adds search-node events to traces.
# Packaged default: false.
# false: traces stay focused on top-level decisions and scoring.
# true: useful for search debugging, but much larger and slower.
# Warning: enable only for short diagnostic runs unless you also lower xmage.ai.trace.nodes.max.
xmage.ai.trace.nodes=false

# Limit for verbose search-node events when xmage.ai.trace.nodes=true.
# Packaged default: 5000.
# Lower: smaller trace files but less search detail.
# Higher: more complete search history but larger files and more I/O.
# Warning: 0 or negative removes this verbose-node limit.
xmage.ai.trace.nodes.max=5000

# Records before/after state impact summaries for evaluated actions.
# Packaged default: false.
# false: avoids extra state comparison work.
# true: trace entries can include life, battlefield, counters, damage, tapping, and combat deltas.
# Warning: useful for debugging "why did it think this mattered", but more expensive than normal tracing.
xmage.ai.trace.impact=false

# Enables the server-side AI companion suggestion endpoint for human players.
# Packaged default: false.
# false: no companion suggestions.
# true: companion builds suggestions using a strategic AI clone without writing decision traces.
# Warning: companion work is extra analysis on top of the live game.
xmage.ai.companion=false

# Number of top companion suggestions shown.
# Packaged default: 3.
# Lower: shorter, simpler companion output.
# Higher: more alternatives but noisier output and slightly more formatting work.
# Lower bound: values below 1 are treated as 1.
xmage.ai.companion.top=3

# Reserved companion action-count setting for local launch tooling.
# Packaged default: 36.
# Current warning: the Java companion code does not currently consume this property directly,
# so changing it may have no effect outside launcher/config parity until a consumer is added.
xmage.ai.companion.maxActions=36

# Skill value used by the companion's internal strategic player.
# Packaged default: 4.
# Lower: weaker/faster companion analysis.
# Higher: stronger/slower companion analysis, depending on the AI skill hooks used by the base player.
# Warning: very high values can increase companion latency.
xmage.ai.companion.skill=4

# Strategic search stabilization
#
# Maximum think time, in seconds, for the strategic AI decision search.
# Packaged default: 12.
# Lower: faster turns and less server wait, but shallower choices.
# Higher: more time for complex boards, but slower games.
# Warning: this is a per-decision budget; large multiplayer boards can still be expensive.
xmage.ai.strategy.maxThinkTimeSecs=12

# Maximum search nodes for the strategic AI.
# Packaged default: 4000.
# Lower: faster and lower memory use, with weaker tactical search.
# Higher: deeper/wider search, with more CPU and memory pressure.
# Warning: raising this should usually be paired with careful heap-guard settings.
xmage.ai.strategy.maxNodes=4000

# Minimum milliseconds allocated to each top-level candidate during a decision.
# Packaged default: 350.
# Lower: candidates can be skipped faster, improving speed but increasing evaluation noise.
# Higher: gives every candidate more analysis time, but can slow wide action lists.
# Warning: keep this <= xmage.ai.strategy.candidateBudgetMaxMs.
xmage.ai.strategy.candidateBudgetMinMs=350

# Maximum milliseconds allocated to each top-level candidate during a decision.
# Packaged default: 1800. Code fallback if this key is removed: 3000.
# Lower: prevents one action from consuming too much time.
# Higher: gives promising or late candidates more analysis time.
# Warning: high values multiply badly when many legal actions exist.
xmage.ai.strategy.candidateBudgetMaxMs=1800

# Maximum simulated attack combinations considered for combat decisions.
# Packaged default: 128. Code fallback if this key is removed: 256.
# Lower: faster combat, but can miss multi-attacker lines.
# Higher: better combat coverage, but attack combinations grow quickly.
# Warning: very high values can make creature-heavy boards slow.
xmage.ai.strategy.attackCombinationLimit=128

# Maximum target choices considered per ability while simulating actions.
# Packaged default: 128. Code fallback if this key is removed: 256.
# Lower: faster targeting, but may miss a better target.
# Higher: better target coverage, but target-heavy spells and boards get expensive.
xmage.ai.strategy.targetOptionsPerAbility=128

# Maximum entries in the strategic search cache.
# Packaged default: 12000. Code fallback if this key is removed: 25000.
# Lower: less memory, but repeated states are recomputed more often.
# Higher: more reuse and speed on repeated states, but higher memory use.
# Warning: excessive values can add heap pressure on long multiplayer games.
xmage.ai.strategy.searchCacheMaxEntries=12000

# Enables adaptive search-budget calculations for wide boards and heap pressure.
# Packaged default: true.
# false: uses fixed maxThinkTimeSecs/maxNodes limits only.
# true: allows the strategic AI to reduce effective depth/nodes when the board is too wide.
xmage.ai.strategy.searchBudget.enabled=true

# Applies adaptive search-budget reductions.
# Packaged default: true.
# false: disables budget reductions even when the policy is enabled.
# true: applies reductions for legal-action pressure and heap pressure.
# Use false when comparing fixed-search behavior against the adaptive policy.
xmage.ai.strategy.searchBudget.apply=true

# Minimum effective search depth the adaptive budget should preserve.
# Packaged default: 5.
# Lower: permits shallower emergency searches and faster wide-board decisions.
# Higher: preserves more quality, but may reduce the policy's ability to stabilize large boards.
# Warning: if this is >= current max depth, adaptive depth reduction cannot happen.
xmage.ai.strategy.searchBudget.minDepth=5

# Legal-action count where a board is considered large.
# Packaged default: 45.
# Lower: adaptive budget starts earlier, improving speed but potentially reducing quality sooner.
# Higher: waits longer before reducing search effort.
xmage.ai.strategy.searchBudget.largeBoardThreshold=45

# Legal-action count where a board is considered huge.
# Packaged default: 65.
# Lower: stronger stabilization starts earlier.
# Higher: allows wider search before emergency reductions.
# Warning: should normally be greater than largeBoardThreshold.
xmage.ai.strategy.searchBudget.hugeBoardThreshold=65

# Enables heap-pressure protection during strategic search.
# Packaged default: true.
# false: search only stops for normal time/node limits.
# true: search can stop early if used heap ratio or free heap thresholds are crossed.
# Warning: disabling can make large Commander games more prone to memory pressure.
xmage.ai.strategy.searchBudget.heapGuard.enabled=true

# Used-heap ratio that triggers heap-pressure protection.
# Packaged default: 0.90.
# Lower: stops search earlier and preserves memory.
# Higher: allows more search before stopping.
# Warning: values near or above 1.0 can make the ratio guard ineffective; values <= 0 stop immediately.
xmage.ai.strategy.searchBudget.heapGuard.maxUsedRatio=0.90

# Minimum free heap, in MB, to preserve during strategic search.
# Packaged default: 768.
# Lower: allows search to continue with less free memory.
# Higher: stops earlier and protects server stability.
# Warning: set this with the actual server heap size in mind.
xmage.ai.strategy.searchBudget.heapGuard.minFreeMb=768

# Strategic cast variants.
#
# Exposes selected optional/alternative spell cost plans as first-class candidate actions
# for Mad Strategic AI only. Initial optional-additional coverage includes buyback
# and bounded replicate counts. Variants can mark source preservation so combo-progress
# can prefer keeping repeatable spell lines available until visible combat lethal exists.
# Defaults: enabled=true, apply=true.
# Warning: this changes the strategic AI action surface, but not the original Mad AI.
xmage.ai.strategy.castVariants.enabled=true
xmage.ai.strategy.castVariants.apply=true

# Strategy modules
#
# Each module below follows the enabled/apply/maxScoreModifier pattern described at the top.

# Alternate loss pressure.
# Controls whether the AI prioritizes answers to effects or states that can cause an alternate loss.
# Defaults: enabled=true, apply=true, maxScoreModifier=50.
# Lower cap: less urgency for niche loss-prevention answers.
# Higher cap: stronger willingness to spend resources to avoid alternate-loss pressure.
# Warning: too high can overprioritize rare alternate-loss cases over normal board development.
xmage.ai.strategy.alternateLoss.enabled=true
xmage.ai.strategy.alternateLoss.apply=true
xmage.ai.strategy.alternateLoss.maxScoreModifier=50

# Board role targeting.
# Controls extra value for targeting enemy engines, payoffs, finishers, bodies, resources, and utility permanents.
# Defaults: enabled=true, apply=true, maxScoreModifier=36.
# Lower cap: target choice leans more on base simulation.
# Higher cap: removal and hostile actions focus more aggressively on high-role permanents.
# Warning: too high can overvalue text-heavy utility permanents compared with immediate combat math.
xmage.ai.strategy.boardRole.enabled=true
xmage.ai.strategy.boardRole.apply=true
xmage.ai.strategy.boardRole.maxScoreModifier=36

# Color access.
# Controls rewards for mana fixing, unlocking colors in hand, and enabling commander colors.
# Defaults: enabled=true, apply=true, maxScoreModifier=45.
# Lower cap: less priority for fixing and color access.
# Higher cap: stronger preference for lands, rocks, and fixing that unlock future plays.
# Warning: too high can delay pressure while chasing perfect colors.
xmage.ai.strategy.colorAccess.enabled=true
xmage.ai.strategy.colorAccess.apply=true
xmage.ai.strategy.colorAccess.maxScoreModifier=45

# Combat pressure.
# Controls strategic combat pressure signals: lethal, damage push, self-risk, trades, and attack triggers.
# Defaults: enabled=true, apply=true, maxScoreModifier=60.
# Lower cap: combat choices follow base simulation more closely.
# Higher cap: more assertive combat and stronger avoidance of bad combat exposure.
# Warning: high values can swing combat style noticeably; test in creature-heavy games.
xmage.ai.strategy.combatPressure.enabled=true
xmage.ai.strategy.combatPressure.apply=true
xmage.ai.strategy.combatPressure.maxScoreModifier=60

# Combo progress.
# Controls rewards for engine actions, resource-burst plays, and finite repeatable-loop progress
# such as source-preserving buyback lines toward visible lethal pressure.
# Defaults: enabled=true, apply=true, maxScoreModifier=40.
# Lower cap: less preference for setup and synergy actions.
# Higher cap: more willingness to take setup lines over immediate board value.
# Warning: too high can make the AI spend too many turns on setup when it should defend or close the game.
xmage.ai.strategy.comboProgress.enabled=true
xmage.ai.strategy.comboProgress.apply=true
xmage.ai.strategy.comboProgress.maxScoreModifier=40

# Commander lifecycle.
# Controls Commander-specific deploy, commander tax, protection, and commander-loss signals.
# Defaults: enabled=true, apply=true, maxScoreModifier=60.
# Lower cap: commander is treated less specially.
# Higher cap: more commander-centric play and more care around commander protection.
# Warning: mostly relevant to Commander; high values can overcommit to commander plans.
xmage.ai.strategy.commanderLifecycle.enabled=true
xmage.ai.strategy.commanderLifecycle.apply=true
xmage.ai.strategy.commanderLifecycle.maxScoreModifier=60

# Defense reserve.
# Controls penalties for leaving the AI exposed to crack-back or insufficient blockers.
# Defaults: enabled=true, apply=true, maxScoreModifier=50.
# Lower cap: AI attacks/taps out more readily.
# Higher cap: AI preserves blockers and defensive resources more strongly.
# Warning: too high can make the AI overly passive.
xmage.ai.strategy.defenseReserve.enabled=true
xmage.ai.strategy.defenseReserve.apply=true
xmage.ai.strategy.defenseReserve.maxScoreModifier=50

# FFA target priority.
# Controls target choice in multiplayer, especially pressure toward the most relevant opponent.
# Defaults: enabled=true, apply=true, maxScoreModifier=30.
# Lower cap: less table-position targeting.
# Higher cap: more focus on high-priority opponents.
# Warning: too high can make the AI tunnel on one opponent.
xmage.ai.strategy.ffaTarget.enabled=true
xmage.ai.strategy.ffaTarget.apply=true
xmage.ai.strategy.ffaTarget.maxScoreModifier=30

# FFA table threat.
# Controls threat assessment for opponents in multiplayer games.
# Defaults: enabled=true, apply=true, maxScoreModifier=40.
# Lower cap: less multiplayer threat correction.
# Higher cap: stronger action toward the table's leading threat.
# Warning: too high can encourage dogpiling and ignore tactical value.
xmage.ai.strategy.ffaThreat.enabled=true
xmage.ai.strategy.ffaThreat.apply=true
xmage.ai.strategy.ffaThreat.maxScoreModifier=40

# Game stage context.
# Controls broad early/late game pressure: early FFA restraint and late-game conversion.
# Defaults: enabled=true, apply=true, maxScoreModifier=12.
# Lower cap: nearly removes broad turn-count influence.
# Higher cap: makes game stage affect more decisions.
# Warning: keep small; this is intentionally a light context nudge.
xmage.ai.strategy.gameStage.enabled=true
xmage.ai.strategy.gameStage.apply=true
xmage.ai.strategy.gameStage.maxScoreModifier=12

# Hand plan.
# Controls main-phase hand planning: card access when low on cards and mana development with a large hand.
# Defaults: enabled=true, apply=true, maxScoreModifier=28.
# Lower cap: less priority for draw/ramp based on hand size.
# Higher cap: more willingness to spend turns improving hand conversion.
# Warning: too high can overvalue draw/ramp when the board needs immediate action.
xmage.ai.strategy.handPlan.enabled=true
xmage.ai.strategy.handPlan.apply=true
xmage.ai.strategy.handPlan.maxScoreModifier=28

# Hand quality.
# Controls preservation/improvement of cards in hand, including dynamic scaling creatures such as cards
# whose power/toughness depend on graveyards, creatures, lands, artifacts, enchantments, or hand size.
# Defaults: enabled=true, apply=true, maxScoreModifier=40.
# Lower cap: less protection for valuable hand cards during discard or hand-changing actions.
# Higher cap: stronger preservation of future-value hand cards and stronger reward for improving hand quality.
# Warning: handQuality.apply=false disables this module's live score and also disables strategic discard targeting.
xmage.ai.strategy.handQuality.enabled=true
xmage.ai.strategy.handQuality.apply=true
xmage.ai.strategy.handQuality.maxScoreModifier=40

# Interaction timing.
# Controls stack interaction and hold/spend timing for instant-speed or disruptive actions.
# Defaults: enabled=true, apply=true, maxScoreModifier=35.
# Lower cap: AI spends interaction more freely.
# Higher cap: AI is more willing to hold interaction for higher-impact windows.
# Warning: too high can make the AI hoard answers.
xmage.ai.strategy.interactionTiming.enabled=true
xmage.ai.strategy.interactionTiming.apply=true
xmage.ai.strategy.interactionTiming.maxScoreModifier=35

# Phase strategy.
# Controls phase-aware timing, such as pre-draw holds, main-phase development, postcombat deployment,
# and combat discipline.
# Defaults: enabled=true, apply=true, maxScoreModifier=40.
# Lower cap: fewer timing corrections.
# Higher cap: stronger preference for strategically correct timing windows.
# Warning: too high can delay useful actions when the tactical simulation already found value.
xmage.ai.strategy.phaseStrategy.enabled=true
xmage.ai.strategy.phaseStrategy.apply=true
xmage.ai.strategy.phaseStrategy.maxScoreModifier=40

# Political memory.
# Controls multiplayer political heuristics such as avoiding kingmaking lines.
# Defaults: enabled=true, apply=true, maxScoreModifier=30.
# Lower cap: less political restraint.
# Higher cap: more avoidance of actions that distort the table in a losing player's favor.
# Warning: this is heuristic; high values can avoid tactically correct plays.
xmage.ai.strategy.politicalMemory.enabled=true
xmage.ai.strategy.politicalMemory.apply=true
xmage.ai.strategy.politicalMemory.maxScoreModifier=30

# Resource development.
# Controls mana-source, late-ramp, and curve-development rewards.
# Defaults: enabled=true, apply=true, maxScoreModifier=45.
# Lower cap: less priority for mana development.
# Higher cap: stronger ramp/curve preference.
# Warning: too high can keep developing resources after the game has shifted to threats or answers.
xmage.ai.strategy.resourceDevelopment.enabled=true
xmage.ai.strategy.resourceDevelopment.apply=true
xmage.ai.strategy.resourceDevelopment.maxScoreModifier=45

# Sacrifice and cost risk.
# Controls penalties for actions with risky sacrifice or resource costs.
# Defaults: enabled=true, apply=true, maxScoreModifier=35.
# Lower cap: AI accepts sacrifice/cost lines more readily.
# Higher cap: AI becomes more cautious about sacrificing or spending key resources.
# Warning: too high can reject correct sacrifice synergies.
xmage.ai.strategy.sacrificeCost.enabled=true
xmage.ai.strategy.sacrificeCost.apply=true
xmage.ai.strategy.sacrificeCost.maxScoreModifier=35

# Search and tutor.
# Controls strategic value for tutor/search actions.
# Defaults: enabled=true, apply=true, maxScoreModifier=30.
# Lower cap: tutors are valued closer to the base simulation result.
# Higher cap: more willingness to search for setup or answers.
# Warning: too high can overvalue slow tutors when immediate board action is needed.
xmage.ai.strategy.searchTutor.enabled=true
xmage.ai.strategy.searchTutor.apply=true
xmage.ai.strategy.searchTutor.maxScoreModifier=30

# Target quality.
# Controls whether hostile and beneficial actions pick high-impact targets rather than low-impact ones.
# Defaults: enabled=true, apply=true, maxScoreModifier=45.
# Lower cap: target choice follows base simulation more closely.
# Higher cap: stronger correction toward important threats or better friendly targets.
# Warning: too high can overrule short-term tactical target value.
xmage.ai.strategy.targetQuality.enabled=true
xmage.ai.strategy.targetQuality.apply=true
xmage.ai.strategy.targetQuality.maxScoreModifier=45

# Threat projection.
# Controls next-turn threat projection, mostly penalizing lines that leave the AI behind against projected threats.
# Defaults: enabled=true, apply=true, maxScoreModifier=35.
# Lower cap: less future-threat avoidance.
# Higher cap: stronger preference for plays that reduce next-turn danger.
# Warning: too high can make the AI overly defensive against projected rather than current threats.
xmage.ai.strategy.threatProjection.enabled=true
xmage.ai.strategy.threatProjection.apply=true
xmage.ai.strategy.threatProjection.maxScoreModifier=35

# Token swarm.
# Controls rewards for wide-board and token-swarm development.
# Defaults: enabled=true, apply=true, maxScoreModifier=35.
# Lower cap: fewer token/wide-board preferences.
# Higher cap: stronger commitment to go-wide strategies.
# Warning: too high can overextend into sweepers or ignore quality threats.
xmage.ai.strategy.tokenSwarm.enabled=true
xmage.ai.strategy.tokenSwarm.apply=true
xmage.ai.strategy.tokenSwarm.maxScoreModifier=35

# Win closure.
# Controls rewards for eliminating opponents cheaply and penalties for excessive overkill cost.
# Defaults: enabled=true, apply=true, maxScoreModifier=30.
# Lower cap: less pressure to close out opponents.
# Higher cap: more willingness to finish players and more sensitivity to wasteful overkill.
# Warning: too high can force closure attempts when board stabilization is more important.
xmage.ai.strategy.winClosure.enabled=true
xmage.ai.strategy.winClosure.apply=true
xmage.ai.strategy.winClosure.maxScoreModifier=30
