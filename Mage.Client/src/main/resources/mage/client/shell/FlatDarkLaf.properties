# Modern UI shell — DARK variant palette ("Arcane Dark").
#
# Applied on top of FlatLaf.properties when the dark shell is active (the default).
# A warm-slate dark with a luminous blue-violet "arcane" accent, chosen to sit calmly behind
# colorful card art rather than compete with it.

# --- Core palette ----------------------------------------------------------
@background = #1E2128
@foreground = #D6D9E0
@accentColor = #7C9CE6

# Icon glyph colours (mage.client.shell.ShellIcons), kept separate from body text so icons can be
# tuned for contrast independently. Brighter than @foreground for legibility on the dark surface.
Shell.iconColor = #ECEEF2
Shell.iconAccent = @accentColor

# Derived surfaces (kept close to @background so panels read as one continuous surface).
Panel.background = @background
MenuBar.background = lighten(@background,3%)
ToolBar.background = lighten(@background,3%)
TableHeader.background = lighten(@background,5%)
Table.background = lighten(@background,2%)
List.background = lighten(@background,2%)
Tree.background = lighten(@background,2%)
TextField.background = lighten(@background,6%)
TextArea.background = lighten(@background,6%)
FormattedTextField.background = lighten(@background,6%)
PasswordField.background = lighten(@background,6%)
ComboBox.background = lighten(@background,6%)
ScrollBar.track = @background
ScrollBar.thumb = lighten(@background,14%)

# Borders / separators — subtle, low contrast.
Component.borderColor = lighten(@background,12%)
Separator.foreground = lighten(@background,10%)
TabbedPane.underlineColor = @accentColor
