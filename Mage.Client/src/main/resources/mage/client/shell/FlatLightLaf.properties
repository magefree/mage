# Modern UI shell — LIGHT variant palette ("Arcane Parchment").
#
# Applied on top of FlatLaf.properties when the light shell is active
# (XMAGE_SHELL_THEME=light / -Dxmage.shell.theme=light).
# A warm off-white "parchment" surface with a deep arcane-blue accent.

# --- Core palette ----------------------------------------------------------
@background = #F2EFE9
@foreground = #2B2620
@accentColor = #2F5DA8

# Icon glyph colours (mage.client.shell.ShellIcons), tuned for high contrast on the parchment.
Shell.iconColor = #243240
Shell.iconAccent = @accentColor

# Derived surfaces.
Panel.background = @background
MenuBar.background = darken(@background,3%)
ToolBar.background = darken(@background,3%)
TableHeader.background = darken(@background,6%)
Table.background = #FBFAF7
List.background = #FBFAF7
Tree.background = #FBFAF7
TextField.background = #FFFFFF
TextArea.background = #FFFFFF
FormattedTextField.background = #FFFFFF
PasswordField.background = #FFFFFF
ComboBox.background = #FFFFFF
ScrollBar.track = @background
ScrollBar.thumb = darken(@background,18%)

# Borders / separators.
Component.borderColor = darken(@background,16%)
Separator.foreground = darken(@background,12%)
TabbedPane.underlineColor = @accentColor
