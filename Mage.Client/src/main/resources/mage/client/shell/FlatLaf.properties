# Modern UI shell — FlatLaf customisation (opt-in via XMAGE_SHELL=1 / -Dxmage.shell=1).
#
# This file is loaded by FlatLaf.registerCustomDefaultsSource("mage.client.shell") in
# mage.client.shell.Shell. It is purely additive: it never overwrites upstream code, so all
# Phase-1 theming can be tuned here without recompiling. Syntax reference:
# https://www.formdev.com/flatlaf/properties-files/

# --- Accent ----------------------------------------------------------------
# A calm "mana blue" used for focus rings, selection, default buttons and sliders.
@accentColor = #4C8DD6

# --- Shape / roundness -----------------------------------------------------
Component.arc = 10
Button.arc = 10
CheckBox.arc = 6
ProgressBar.arc = 8
TextComponent.arc = 8
Component.focusWidth = 1

# --- Scrollbars (slim, rounded, auto-hiding thumb) -------------------------
ScrollBar.width = 12
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.showButtons = false

# --- Spacing & chrome ------------------------------------------------------
TabbedPane.showTabSeparators = true
TabbedPane.tabHeight = 32
TitlePane.unifiedBackground = true
MenuBar.itemMargins = 4,10,4,10
MenuItem.margin = 4,10,4,10
Table.showHorizontalLines = false
Table.intercellSpacing = 0,1
