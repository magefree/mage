# Modern UI shell — shared FlatLaf customisation (theme-independent).
#
# Loaded by FlatLaf.registerCustomDefaultsSource("mage.client.shell") in mage.client.shell.Shell.
# This file applies to BOTH the dark and light variants; palette lives in the per-variant files
# FlatDarkLaf.properties / FlatLightLaf.properties. Purely additive — tune freely, no recompile.
# Syntax: https://www.formdev.com/flatlaf/properties-files/

# --- Shape / roundness -----------------------------------------------------
Component.arc = 10
Button.arc = 10
CheckBox.arc = 6
ProgressBar.arc = 8
TextComponent.arc = 8
Component.focusWidth = 1

# --- Scrollbars (slim, rounded, no arrow buttons) --------------------------
ScrollBar.width = 11
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.showButtons = false

# --- Density (modern, compact controls) ------------------------------------
# XMage's controls were sized for old, low-resolution screens. These reduce the padding/min sizes
# of *standard* Swing controls (dialogs, deck editor, lobby tables, menus, combos) so the UI reads
# as a modern, dense application. NOTE: large in-game *image* buttons (phase / command / player
# panels) are hard-coded in Java via GUISizeHelper and are NOT affected here — see
# SHELL_OBSERVATIONS.md for the code-level density backlog.
Button.margin = 3,10,3,10
Button.minimumWidth = 64
ToggleButton.margin = 3,10,3,10
ComboBox.padding = 1,6,1,6
Spinner.padding = 1,6,1,6
List.cellMargins = 1,6,1,6

# --- Spacing & chrome ------------------------------------------------------
TabbedPane.showTabSeparators = true
TabbedPane.tabHeight = 28
TabbedPane.tabInsets = 4,12,4,12
TitlePane.unifiedBackground = true
MenuBar.itemMargins = 3,9,3,9
MenuItem.margin = 3,9,3,9
Table.showHorizontalLines = false
Table.intercellSpacing = 0,1

# NOTE: global font size is intentionally left untouched — XMage drives layout sizing through
# GUISizeHelper, and overriding defaultFont here can fight that logic.
