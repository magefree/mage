# Modern UI shell — shared FlatLaf customisation (theme-independent).
#
# Loaded by FlatLaf.registerCustomDefaultsSource("mage.client.shell") in mage.client.shell.Shell.
# This file applies to BOTH the dark and light variants; palette lives in the per-variant files
# FlatDarkLaf.properties / FlatLightLaf.properties. Purely additive — tune freely, no recompile.
# Syntax: https://www.formdev.com/flatlaf/properties-files/

# --- Shape / roundness -----------------------------------------------------
Component.arc = 10
Button.arc = 10
CheckBox.arc = 6
ProgressBar.arc = 8
TextComponent.arc = 8
Component.focusWidth = 1

# --- Scrollbars (slim, rounded, no arrow buttons) --------------------------
ScrollBar.width = 12
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.showButtons = false

# --- Spacing & chrome ------------------------------------------------------
TabbedPane.showTabSeparators = true
TabbedPane.tabHeight = 32
TitlePane.unifiedBackground = true
MenuBar.itemMargins = 4,10,4,10
MenuItem.margin = 4,10,4,10
Table.showHorizontalLines = false
Table.intercellSpacing = 0,1

# NOTE: global font size is intentionally left untouched — XMage drives layout sizing through
# GUISizeHelper, and overriding defaultFont here can fight that logic. Revisit in Phase 2.
